<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字矩形填格 - 关卡版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { margin-bottom: 10px; color: #333; }

        /* ====== 规则页 ====== */
        .rules-page { text-align: center; max-width: 500px; }
        .rules-page h1 { font-size: 28px; color: #409eff; margin-bottom: 16px; }
        .rules-page p { font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 24px; text-align: left; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .rules-page button { font-size: 18px; padding: 12px 36px; background: #409eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

        /* ====== 游戏页 ====== */
        .game-page { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        .level-info { font-size: 18px; font-weight: bold; color: #409eff; margin-bottom: 8px; }
        .tip { margin: 8px 0 12px; color: #666; text-align: center; font-size: 13px; line-height: 1.5; max-width: 500px; }
        .btn-group { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        button { padding: 6px 14px; border: none; border-radius: 4px; background: #409eff; color: #fff; cursor: pointer; font-size: 13px; }
        #resetBtn { background: #f56c6c; }
        #prevLevel, #backToRules { background: #909399; }
        .board { display: grid; gap: 2px; background: #999; padding: 2px; border-radius: 4px; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ddd; user-select: none; cursor: pointer; border-radius: 2px; }
        .cell.number { border: 2px solid #222; }
        .cell.selected { background: #dceafe !important; }
        .cell.filled { cursor: pointer; border: 2px solid #4CAF50 !important; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .win-text { color: #67c23a; font-size: 20px; font-weight: bold; margin-top: 12px; min-height: 28px; }
        .next-level-btn { margin-top: 10px; background: #67c23a; padding: 10px 24px; font-size: 15px; border-radius: 6px; }

        /* ====== 自定义模态框 ====== */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(128,0,128,0.25); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px 32px; max-width: 360px; text-align: center; box-shadow: 0 8px 30px rgba(128,0,128,0.3); }
        .modal-box p { font-size: 15px; color: #333; margin-bottom: 16px; line-height: 1.6; }
        .modal-box button { background: #9b59b6; padding: 8px 24px; border-radius: 6px; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 规则页 -->
    <div class="rules-page" id="rulesPage">
        <h1>🎯 数字矩形填格</h1>
        <p>
            <strong>规则：</strong><br>
            每个数字代表一个正方形或长方形区域，格子数量等于该数字的值。<br>
            你需要用不同颜色的矩形/正方形填满整个棋盘。<br><br>
            <strong>操作：</strong><br>
            ① 点击带数字的格子开始选择 → ② 依次点击空白格加入选中 → ③ 选满后自动校验是否为规则矩形<br>
            选错了可以取消已选格子，或点击已填充区域整组还原。
        </p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <!-- 游戏页 -->
    <div class="game-page" id="gamePage">
        <h2>数字矩形填格</h2>
        <div class="level-info" id="levelInfo"></div>
        <div class="tip">点击数字开始选 → 点空白格加入 → 点已选格取消 → 点已填充区域整组还原</div>
        <div class="btn-group">
            <button id="backToRules">规则</button>
            <button id="prevLevel">上一关</button>
            <button id="resetBtn">重置本关</button>
            <button id="newGame">重新开始</button>
        </div>
        <div class="board" id="board"></div>
        <div class="win-text" id="winTip"></div>
        <button id="nextLevelBtn" class="next-level-btn" style="display: none;">进入下一关</button>
    </div>

    <!-- 自定义模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <p id="modalText"></p>
            <button onclick="closeModal()">好的</button>
        </div>
    </div>

    <script>
        const colorMap = {
            1: '#ffcccc', 2: '#ffe6cc', 3: '#ffffcc',
            4: '#e6ffcc', 5: '#ccffcc', 6: '#ccffe6',
            7: '#ccffff', 8: '#cce6ff', 9: '#ccccff',
            10: '#e6ccff'
        };

        // ====== 关卡系统 ======
        const TOTAL_LEVELS = 70;   // 3×3到10×10，每尺寸10关
        let currentLevel = 1;      // 全局关卡号 1~70
        let boardSize = 3;         // 当前棋盘尺寸

        let board = [];            // 存储数字信息
        let cells = [];            // 存储DOM元素和坐标
        let currentNumber = 0;
        let selectedCells = [];
        let filledBlocks = [];

        // ====== 页面切换 ======
        function startGame() {
            document.getElementById('rulesPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'flex';
            loadLevel(currentLevel);
        }

        function backToRules() {
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('rulesPage').style.display = 'block';
        }

        // ====== 关卡计算 ======
        function calcBoardSize(level) {
            return Math.floor((level - 1) / 10) + 3;  // 1-10→3, 11-20→4, ..., 61-70→10
        }

        function inLevelProgress(level) {
            return ((level - 1) % 10);  // 同尺寸内的进度 0~9
        }

        // ====== 简易伪随机种子，保证同关重复生成同一谜题 ======
        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                var t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        // ====== 初始化棋盘 ======
        function initBoard(level) {
            currentLevel = level;
            boardSize = calcBoardSize(level);

            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            // 自适应格子尺寸
            let cellPx;
            if (boardSize <= 4) cellPx = 72;
            else if (boardSize <= 6) cellPx = 56;
            else if (boardSize <= 8) cellPx = 44;
            else cellPx = 36;

            boardElement.style.gridTemplateColumns = `repeat(${boardSize}, ${cellPx}px)`;
            boardElement.style.gridTemplateRows = `repeat(${boardSize}, ${cellPx}px)`;

            // 格子字体自适应
            let fontSize;
            if (boardSize <= 4) fontSize = 20;
            else if (boardSize <= 6) fontSize = 17;
            else if (boardSize <= 8) fontSize = 14;
            else fontSize = 11;

            board = Array(boardSize).fill(0).map(() => Array(boardSize).fill(0));
            cells = [];
            currentNumber = 0;
            selectedCells = [];
            filledBlocks = [];

            document.getElementById('winTip').textContent = '';
            document.getElementById('nextLevelBtn').style.display = 'none';

            const progress = inLevelProgress(level);
            const dimName = `${boardSize}×${boardSize}`;
            document.getElementById('levelInfo').textContent = `第 ${currentLevel} 关 / ${TOTAL_LEVELS} - ${dimName} (进度 ${progress + 1}/10)`;

            for (let y = 0; y < boardSize; y++) {
                for (let x = 0; x < boardSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.style.fontSize = fontSize + 'px';
                    const px = cellPx * 0.45;
                    cell.style.width = px + 'px';
                    cell.style.height = px + 'px';
                    boardElement.appendChild(cell);
                    cells.push({ element: cell, x, y });
                }
            }

            generatePuzzle(level);
            bindClickEvents();
            updateButtonStates();
        }

        function loadLevel(level) {
            if (level < 1 || level > TOTAL_LEVELS) return;
            initBoard(level);
        }

        // ====== 谜题生成（带种子，确保同关重复） ======
        function generatePuzzle(level) {
            const progress = inLevelProgress(level);
            const seed = level * 1000 + progress * 7 + 42;
            const rng = mulberry32(seed);

            for (let y = 0; y < boardSize; y++) {
                for (let x = 0; x < boardSize; x++) {
                    board[y][x] = 0;
                    const cell = cells.find(c => c.x === x && c.y === y);
                    cell.element.textContent = '';
                    cell.element.className = 'cell';
                    cell.element.style.backgroundColor = '';
                }
            }

            const rects = [];
            let filled = Array(boardSize).fill(0).map(() => Array(boardSize).fill(false));

            function findFirstEmpty() {
                for (let y = 0; y < boardSize; y++) {
                    for (let x = 0; x < boardSize; x++) {
                        if (!filled[y][x]) return { x, y };
                    }
                }
                return null;
            }

            function canPlaceRect(x, y, w, h) {
                if (x + w > boardSize || y + h > boardSize) return false;
                for (let dy = 0; dy < h; dy++)
                    for (let dx = 0; dx < w; dx++)
                        if (filled[y + dy][x + dx]) return false;
                return true;
            }

            function placeRect(x, y, w, h) {
                const area = w * h;
                rects.push({ x, y, w, h, area });
                for (let dy = 0; dy < h; dy++)
                    for (let dx = 0; dx < w; dx++)
                        filled[y + dy][x + dx] = true;
            }

            // 主填充循环
            while (true) {
                const pos = findFirstEmpty();
                if (!pos) break;
                const x = pos.x, y = pos.y;

                let maxArea = 0, bestW = 1, bestH = 1;
                for (let w = 1; w <= boardSize - x; w++) {
                    for (let h = 1; h <= boardSize - y; h++) {
                        const area = w * h;
                        if (area > 10) continue;
                        if (canPlaceRect(x, y, w, h) && area > maxArea) {
                            maxArea = area; bestW = w; bestH = h;
                        }
                    }
                }

                // 难度控制：后期关卡更倾向于小块
                const difficultyFactor = progress / 10;
                if (Math.random() > 0.3 && maxArea > 2) {
                    const possibleSizes = [];
                    for (let w = 1; w <= bestW; w++) {
                        for (let h = 1; h <= bestH; h++) {
                            const area = w * h;
                            if (area >= 1 && area <= 10 && canPlaceRect(x, y, w, h)) {
                                possibleSizes.push({ w, h, area });
                            }
                        }
                    }
                    // 难度越高越偏向小矩形
                    const smallBias = Math.floor(possibleSizes.length * (0.3 + difficultyFactor * 0.5));
                    const idx = Math.min(smallBias + Math.floor(rng() * Math.max(1, possibleSizes.length - smallBias)), possibleSizes.length - 1);
                    bestW = possibleSizes[Math.max(0, idx)].w;
                    bestH = possibleSizes[Math.max(0, idx)].h;
                }

                placeRect(x, y, bestW, bestH);
            }

            // 确保至少有 boardSize 个数字
            while (rects.length < boardSize) {
                let maxIndex = 0, maxArea = 0;
                for (let i = 0; i < rects.length; i++) {
                    if (rects[i].area > maxArea && rects[i].area > 2) {
                        maxArea = rects[i].area; maxIndex = i;
                    }
                }
                if (maxArea <= 2) break;

                const bigRect = rects.splice(maxIndex, 1)[0];
                if (bigRect.w >= bigRect.h) {
                    const splitW = Math.floor(bigRect.w / 2);
                    rects.push({ x: bigRect.x, y: bigRect.y, w: splitW, h: bigRect.h, area: splitW * bigRect.h });
                    rects.push({ x: bigRect.x + splitW, y: bigRect.y, w: bigRect.w - splitW, h: bigRect.h, area: (bigRect.w - splitW) * bigRect.h });
                } else {
                    const splitH = Math.floor(bigRect.h / 2);
                    rects.push({ x: bigRect.x, y: bigRect.y, w: bigRect.w, h: splitH, area: bigRect.w * splitH });
                    rects.push({ x: bigRect.x, y: bigRect.y + splitH, w: bigRect.w, h: bigRect.h - splitH, area: bigRect.w * (bigRect.h - splitH) });
                }
            }

            // 放数字
            rects.forEach(rect => {
                const rx = rect.x + Math.floor(rng() * rect.w);
                const ry = rect.y + Math.floor(rng() * rect.h);
                board[ry][rx] = rect.area;
                const cell = cells.find(c => c.x === rx && c.y === ry);
                cell.element.textContent = rect.area;
                cell.element.classList.add('number');
                cell.element.style.backgroundColor = colorMap[rect.area];
            });
        }

        // ====== 校验逻辑 ======
        function isRectangle(cellList) {
            if (cellList.length === 0) return false;
            const xs = cellList.map(c => c.x);
            const ys = cellList.map(c => c.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            return (maxX - minX + 1) * (maxY - minY + 1) === cellList.length;
        }

        function isCellFilled(x, y) {
            return filledBlocks.some(block => block.cells.some(c => c.x === x && c.y === y));
        }

        function showModal(text) {
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function updateButtonStates() {
            document.getElementById('prevLevel').disabled = currentLevel <= 1;
        }

        // ====== 点击事件 ======
        function bindClickEvents() {
            cells.forEach(cell => {
                const { element, x, y } = cell;
                element.addEventListener('click', () => {
                    // 1. 点击已填充区块 → 整组还原
                    for (let i = 0; i < filledBlocks.length; i++) {
                        const block = filledBlocks[i];
                        if (block.cells.some(c => c.x === x && c.y === y)) {
                            block.cells.forEach(c => {
                                c.element.style.backgroundColor = board[c.y][c.x] ? colorMap[board[c.y][c.x]] : '';
                                c.element.classList.remove('filled');
                                if (board[c.y][c.x] > 0) c.element.classList.add('number');
                            });
                            filledBlocks.splice(i, 1);
                            document.getElementById('winTip').textContent = '';
                            document.getElementById('nextLevelBtn').style.display = 'none';
                            return;
                        }
                    }

                    // 2. 取消选中
                    const selIdx = selectedCells.findIndex(c => c.x === x && c.y === y);
                    if (selIdx !== -1) {
                        selectedCells.splice(selIdx, 1);
                        element.classList.remove('selected');
                        if (selectedCells.length === 0) currentNumber = 0;
                        return;
                    }

                    // 3. 未开始选择 → 必须点数字
                    if (currentNumber === 0) {
                        const val = board[y][x];
                        if (val > 0) {
                            currentNumber = val;
                            selectedCells.push(cell);
                            element.classList.add('selected');

                            // 数字1直接填充
                            if (currentNumber === 1) {
                                fillCurrentBlock();
                            }
                            return;
                        } else {
                            showModal('请先点击带有数字的格子开始选择！');
                            return;
                        }
                    }

                    // 4. 切换数字
                    const val = board[y][x];
                    if (val > 0) {
                        selectedCells.forEach(c => c.element.classList.remove('selected'));
                        selectedCells = [];
                        currentNumber = val;
                        selectedCells.push(cell);
                        element.classList.add('selected');
                        return;
                    }

                    // 5. 点已填充 → 警告
                    if (isCellFilled(x, y)) {
                        showModal('这个格子已经被占用了！');
                        return;
                    }

                    // 6. 超过数量
                    if (selectedCells.length + 1 > currentNumber) {
                        showModal(`最多只能选择 ${currentNumber} 个格子！`);
                        return;
                    }

                    // 7. 正常添加
                    selectedCells.push(cell);
                    element.classList.add('selected');

                    // 8. 选满 → 校验
                    if (selectedCells.length === currentNumber) {
                        if (isRectangle(selectedCells)) {
                            fillCurrentBlock();
                        } else {
                            showModal(`错误！所选的 ${currentNumber} 个格子不是正方形/长方形，请点击已选格子取消后重新调整！`);
                        }
                    }
                });
            });

            function fillCurrentBlock() {
                const newBlock = { number: currentNumber, cells: [...selectedCells] };
                selectedCells.forEach(c => {
                    c.element.classList.remove('selected');
                    c.element.classList.remove('number');
                    c.element.classList.add('filled');
                    c.element.style.backgroundColor = colorMap[currentNumber];
                });
                filledBlocks.push(newBlock);
                selectedCells = [];
                currentNumber = 0;

                const totalFilled = filledBlocks.reduce((s, b) => s + b.cells.length, 0);
                if (totalFilled === boardSize * boardSize) {
                    onWin();
                }
            }
        }

        function onWin() {
            if (currentLevel >= TOTAL_LEVELS) {
                document.getElementById('winTip').textContent = '🏆 恭喜！你已通关全部 ' + TOTAL_LEVELS + ' 关！';
            } else {
                document.getElementById('winTip').textContent = '🎉 恭喜通过第 ' + currentLevel + ' 关！';
                document.getElementById('nextLevelBtn').style.display = 'block';
            }
        }

        // ====== 按钮事件 ======
        document.getElementById('nextLevelBtn').addEventListener('click', () => {
            if (currentLevel < TOTAL_LEVELS) {
                initBoard(currentLevel + 1);
            }
        });

        document.getElementById('prevLevel').addEventListener('click', () => {
            if (currentLevel > 1) {
                initBoard(currentLevel - 1);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            initBoard(currentLevel);
        });

        document.getElementById('newGame').addEventListener('click', () => {
            currentLevel = 1;
            initBoard(1);
        });

        document.getElementById('backToRules').addEventListener('click', backToRules);

        // URL hash 路由支持
        if (window.location.hash === '#game') {
            startGame();
        } else {
            document.getElementById('rulesPage').style.display = 'block';
        }
    </script>
</body>
</html>
