<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字矩形填格</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; padding: 20px; }
.rules-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.rules-page h1 { font-size: 36px; background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
.rules-page p { font-size: 14px; color: #b0b0c0; line-height: 1.8; max-width: 400px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 16px; }
.start-btn { font-size: 16px; padding: 12px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
.start-btn:hover { transform: scale(1.05); }
.game-page { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; max-width: 500px; }
canvas { border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.08); margin: 10px 0; }
.progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); transition: width 0.3s; }
.btn-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
.btn-group button { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer; font-size: 13px; transition: background 0.2s; }
.btn-group button:hover { background: rgba(255,255,255,0.12); }
.btn-group button:disabled, .btn-group button[style*='opacity: 0.4'] { opacity: 0.4 !important; cursor: default; }
#levelBadge { font-size: 13px; color: #aaa; margin-bottom: 5px; }
#winTip { font-size: 16px; color: #ffd43b; margin-top: 10px; min-height: 24px; text-align: center; }
#nextLevelBtn { background: linear-gradient(135deg, #f093fb, #f5576c) !important; color: #fff !important; font-weight: bold; border: none !important; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
.modal-overlay.show { display: flex; }
.modal-box { background: #2a2a4a; color: #fff; padding: 30px 40px; border-radius: 16px; font-size: 16px; max-width: 350px; text-align: center; box-shadow: 0 8px 40px rgba(79,172,254,0.3); border: 1px solid rgba(79,172,254,0.2); }
</style>
</head>
<body>

<!-- 规则页 -->
<div class="rules-page" id="rulesPage">
    <h1>🎯 数字矩形填格</h1>
    <p>选择一个数字，然后选择对应数量的格子组成矩形。全部填满即可通关！共70关（3×3 到 9×9）。每关难度递增。</p>
    <button class="start-btn" onclick="startGame()">开 始 游 戏</button>
</div>

<!-- 游戏页 -->
<div class="game-page" id="gamePage">
    <h2 style="margin-bottom:5px;">数字矩形填格</h2>
    <div id="levelBadge"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="btn-group">
        <button onclick="newGame()">🔄 重新开始</button>
        <button onclick="goPrevLevel()">⬅ 上一关</button>
        <button id="nextLevelBtn" onclick="loadLevel(currentLevel+1)" style="display:none;">➡ 下一关</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <p id="winTip"></p>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-box">
        <span id="modalText"></span>
    </div>
</div>

<script>
/* ====== Canvas 引用 ====== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

/* ====== 关卡系统 ====== */
const TOTAL_LEVELS = 70;
let currentLevel = 1, boardSize = 3;
let board = [], cells = [], currentNumber = 0;
let selectedCells = [], filledBlocks = [];

function calcBoardSize(level) { return Math.floor((level - 1) / 10) + 3; }
function inLevelProgress(level) { return (level - 1) % 10; }

/* ====== 粒子系统 ====== */
const particles = [];
let animating = false;

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6 - 2,
            life: 1,
            color,
            size: Math.random() * 4 + 2
        });
    }
    if (!animating) { animating = true; startAnimation(); }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function startAnimation() {
    function frame() {
        updateParticles();
        draw(); // 每次更新粒子后重绘
        if (particles.length > 0) {
            requestAnimationFrame(frame);
        } else {
            animating = false;
            draw(); // 最终稳定帧
        }
    }
    frame();
}

/* ====== 关卡初始化 ====== */
function initBoard(level) {
    currentLevel = level;
    boardSize = calcBoardSize(level);

    let cellPx;
    if (boardSize <= 4) cellPx = 72;
    else if (boardSize <= 6) cellPx = 56;
    else if (boardSize <= 8) cellPx = 44;
    else cellPx = 36;

    const gap = 3;
    const pad = 10;
    canvas.width = boardSize * (cellPx + gap) - gap + pad * 2;
    canvas.height = boardSize * (cellPx + gap) - gap + pad * 2;

    let fontSize;
    if (boardSize <= 4) fontSize = 20;
    else if (boardSize <= 6) fontSize = 17;
    else if (boardSize <= 8) fontSize = 14;
    else fontSize = 11;

    board = Array(boardSize).fill(0).map(() => Array(boardSize).fill(0));
    cells = [];
    currentNumber = 0;
    selectedCells = [];
    filledBlocks = [];
    particles.length = 0;

    document.getElementById('winTip').textContent = '';
    document.getElementById('nextLevelBtn').style.display = 'none';

    const progress = inLevelProgress(level);
    const dimName = `${boardSize}\u00d7${boardSize}`;
    document.getElementById('levelBadge').textContent = `第 ${currentLevel} 关 / ${TOTAL_LEVELS} - ${dimName} (进度 ${progress + 1}/10)`;
    document.getElementById('progressFill').style.width = ((currentLevel / TOTAL_LEVELS) * 100) + '%';

    for (let y = 0; y < boardSize; y++) {
        for (let x = 0; x < boardSize; x++) {
            const px = pad + x * (cellPx + gap);
            const py = pad + y * (cellPx + gap);
            cells.push({ x, y, px, py, w: cellPx, h: cellPx, fontSize });
        }
    }

    generatePuzzle(level);
    bindClickEvents();
    draw();
    // 启动粒子动画循环（仅在需要时）
    if (!animating) { animating = true; startAnimation(); }
}

function loadLevel(level) {
    if (level < 1 || level > TOTAL_LEVELS) return;
    initBoard(level);
}

/* ====== 简单伪随机 ====== */
function simpleRNG(seed) {
    let s = (seed * 1103515245 + 12345) & 0x7FFFFFFF;
    return function() {
        s = (s * 1103515245 + 12345) & 0x7FFFFFFF;
        return s / 0x7FFFFFFF;
    };
}

/* ====== 谜题生成（确定性完美分割）===== */
function generatePuzzle(level) {
    const size = boardSize;
    let placed = Array(size).fill(0).map(() => Array(size).fill(false));
    const rects = [];

    // 贪心法：从左到右、从上到下填充
    for (let y = 0; y < size && rects.length < size; y++) {
        for (let x = 0; x < size && rects.length < size; x++) {
            if (placed[y][x]) continue;

            let bestW = 1, bestH = 1;
            for (let h = 1; h <= size - y; h++) {
                for (let w = 1; w <= size - x; w++) {
                    const area = w * h;
                    if (area > 10) continue;
                    let ok = true;
                    for (let dy = 0; dy < h && ok; dy++)
                        for (let dx = 0; dx < w && ok; dx++)
                            if (placed[y + dy][x + dx]) ok = false;
                    if (ok) { bestW = w; bestH = h; }
                }
            }

            for (let dy = 0; dy < bestH; dy++)
                for (let dx = 0; dx < bestW; dx++)
                    placed[y + dy][x + dx] = true;
            rects.push({ x, y, w: bestW, h: bestH });
        }
    }

    // 拆分：不够 boardSize 块就拆分最大的矩形
    while (rects.length < size) {
        let maxIdx = -1, maxArea = 0;
        for (let i = 0; i < rects.length; i++) {
            const a = rects[i].w * rects[i].h;
            if (a > maxArea && a > 2) { maxArea = a; maxIdx = i; }
        }
        if (maxIdx === -1) break;

        const rect = rects.splice(maxIdx, 1)[0];
        if (rect.w >= rect.h) {
            const splitW = Math.floor(rect.w / 2);
            if (splitW === 0) break;
            rects.push({ x: rect.x, y: rect.y, w: splitW, h: rect.h });
            rects.push({ x: rect.x + splitW, y: rect.y, w: rect.w - splitW, h: rect.h });
        } else {
            const splitH = Math.floor(rect.h / 2);
            if (splitH === 0) break;
            rects.push({ x: rect.x, y: rect.y, w: rect.w, h: splitH });
            rects.push({ x: rect.x, y: rect.y + splitH, w: rect.w, h: rect.h - splitH });
        }
    }

    // 分配数字到每块（取矩形内固定位置）
    const progress = inLevelProgress(level);
    for (let i = 0; i < rects.length; i++) {
        const rect = rects[i];
        const area = rect.w * rect.h;
        if (area > 10 || area < 1) continue;

        const rng = simpleRNG(level * 137 + i * 99 + progress);
        let rx = Math.floor(rng() * rect.w);
        let ry = Math.floor(rng() * rect.h);
        if (rx < 0) rx = 0;
        if (ry < 0) ry = 0;
        if (rx >= rect.w) rx = rect.w - 1;
        if (ry >= rect.h) ry = rect.h - 1;

        const cellY = rect.y + ry;
        const cellX = rect.x + rx;
        if (cellY >= 0 && cellY < size && cellX >= 0 && cellX < size) {
            board[cellY][cellX] = area;
        }
    }
}

/* ====== 工具函数 ====== */
function isRectangle(cellList) {
    if (cellList.length === 0) return false;
    const xs = cellList.map(c => c.x);
    const ys = cellList.map(c => c.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    return (maxX - minX + 1) * (maxY - minY + 1) === cellList.length;
}

function isCellFilled(x, y) {
    return filledBlocks.some(block => block.cells.some(c => c.x === x && c.y === y));
}

/* ====== Canvas 渲染引擎 ====== */
const COLORS = {
    bg: '#1a1a2e',
    numberBg: '#252545',
    selected: 'rgba(79,172,254,0.35)',
    selectedStroke: '#4facfe',
};

const NUMBER_COLORS = {
    1: { fill: '#ff6b8a', stroke: '#ff4070', glow: 'rgba(255,107,138,0.4)' },
    2: { fill: '#ffa94d', stroke: '#ff922b', glow: 'rgba(255,169,77,0.4)' },
    3: { fill: '#ffd43b', stroke: '#fab005', glow: 'rgba(255,212,59,0.4)' },
    4: { fill: '#69db7c', stroke: '#51cf66', glow: 'rgba(105,219,124,0.4)' },
    5: { fill: '#38d9a9', stroke: '#20c997', glow: 'rgba(56,217,169,0.4)' },
    6: { fill: '#4dabf7', stroke: '#339af0', glow: 'rgba(77,171,247,0.4)' },
    7: { fill: '#9775fa', stroke: '#8854d8', glow: 'rgba(151,117,250,0.4)' },
    8: { fill: '#e599f7', stroke: '#cc5de8', glow: 'rgba(229,153,247,0.4)' },
    9: { fill: '#da77f2', stroke: '#be4bdb', glow: 'rgba(218,119,242,0.4)' },
    10:{ fill: '#e8590c', stroke: '#dc3545', glow: 'rgba(232,89,12,0.4)' },
};

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function getBlockColor(num) {
    return NUMBER_COLORS[num] || { fill: '#aaa', stroke: '#888', glow: 'rgba(170,170,170,0.3)' };
}

function shadeColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + percent));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return `rgb(${r},${g},${b})`;
}

function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, w, h);

    // 第一步：绘制所有已填充区块
    for (const block of filledBlocks) {
        drawBlock(block);
    }

    // 记录被覆盖的格子
    const covered = new Set();
    for (const block of filledBlocks) {
        for (const cell of block.cells) {
            covered.add(`${cell.x},${cell.y}`);
        }
    }

    // 第二步：绘制剩余格子（数字/空白/选中）
    for (const cell of cells) {
        const key = `${cell.x},${cell.y}`;
        if (covered.has(key)) continue;

        const { x, y, px, py, w: cw, h: ch, fontSize } = cell;
        const isSelected = selectedCells.some(c => c.x === x && c.y === y);
        const isNumber = board[y][x] > 0;
        const numVal = board[y][x];
        const r = cw * 0.15;

        // ---- 画单元格背景 ----
        ctx.save();
        roundRect(ctx, px, py, cw, ch, r);
        if (isSelected) {
            ctx.shadowColor = COLORS.selectedStroke;
            ctx.shadowBlur = 12;
            ctx.fillStyle = COLORS.selected;
        } else if (isNumber) {
            ctx.fillStyle = '#252545';
        } else {
            ctx.fillStyle = '#222240';
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        // ---- 高光层 ----
        const grad = ctx.createLinearGradient(px, py, px, py + ch * (isSelected ? 0.4 : 0.35));
        if (isSelected) {
            grad.addColorStop(0, 'rgba(79,172,254,0.2)');
            grad.addColorStop(1, 'rgba(79,172,254,0)');
        } else if (isNumber) {
            grad.addColorStop(0, 'rgba(255,255,255,0.08)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
        } else {
            grad.addColorStop(0, 'rgba(255,255,255,0.04)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
        }
        roundRect(ctx, px, py, cw, ch, r);
        ctx.fillStyle = grad;
        ctx.fill();

        // ---- 边框 ----
        if (isSelected) {
            roundRect(ctx, px + 1, py + 1, cw - 2, ch - 2, r);
            ctx.strokeStyle = COLORS.selectedStroke;
            ctx.lineWidth = 2.5;
            ctx.stroke();
        } else if (isNumber) {
            const c = getBlockColor(numVal);
            roundRect(ctx, px + 1, py + 1, cw - 2, ch - 2, r);
            ctx.strokeStyle = c.stroke;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        } else {
            roundRect(ctx, px + 1, py + 1, cw - 2, ch - 2, r);
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // ---- 画数字（选中时也要显示！） ----
        if (isNumber) {
            ctx.fillStyle = isSelected ? '#4facfe' : '#fff';
            ctx.font = `bold ${fontSize}px "Segoe UI"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(numVal, px + cw / 2, py + ch / 2 + 1);
        }

        ctx.restore();
    }

    // 第三步：粒子叠加
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawBlock(block) {
    const xs = block.cells.map(c => c.x);
    const ys = block.cells.map(c => c.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const firstCell = cells.find(c => c.x === minX && c.y === minY);
    if (!firstCell) return;

    const numVal = block.number;
    const c = getBlockColor(numVal);
    const gap = 3;

    const totalW = (maxX - minX + 1) * (firstCell.w + gap) - gap;
    const totalH = (maxY - minY + 1) * (firstCell.h + gap) - gap;
    const ox = firstCell.px;
    const oy = firstCell.py;
    const r = firstCell.w * 0.2;

    ctx.save();
    ctx.shadowColor = c.glow;
    ctx.shadowBlur = 16;
    ctx.shadowOffsetY = 4;

    roundRect(ctx, ox, oy, totalW, totalH, r);
    const bgGrad = ctx.createLinearGradient(ox, oy, ox + totalW, oy + totalH);
    bgGrad.addColorStop(0, c.fill);
    bgGrad.addColorStop(1, shadeColor(c.fill, -20));
    ctx.fillStyle = bgGrad;
    ctx.fill();

    ctx.shadowBlur = 0;
    const hlGrad = ctx.createLinearGradient(ox, oy, ox, oy + totalH * 0.4);
    hlGrad.addColorStop(0, 'rgba(255,255,255,0.18)');
    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hlGrad;
    ctx.fill();

    ctx.strokeStyle = shadeColor(c.stroke, 10);
    ctx.lineWidth = 1.5;
    roundRect(ctx, ox, oy, totalW, totalH, r);
    ctx.stroke();

    // 数字居中
    const cx2 = ox + totalW / 2;
    const cy2 = oy + totalH / 2;
    let fontSize = firstCell.fontSize * (block.cells.length === 1 ? 1 : Math.max(0.7, 1 - block.cells.length * 0.05));
    ctx.font = `bold ${Math.floor(fontSize)}px "Segoe UI"`;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(numVal, cx2, cy2 + 1);

    // 内部分隔线
    if (block.cells.length > 1) {
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        for (let y = minY; y <= maxY; y++) {
            for (let x = minX; x <= maxX; x++) {
                const cell = cells.find(cc => cc.x === x && cc.y === y);
                if (!cell) continue;
                if (x < maxX && block.cells.some(c => c.x === x + 1 && c.y === y)) {
                    ctx.beginPath();
                    ctx.moveTo(cell.px + cell.w + gap / 2, cell.py);
                    ctx.lineTo(cell.px + cell.w + gap / 2, cell.py + cell.h);
                    ctx.stroke();
                }
                if (y < maxY && block.cells.some(c => c.x === x && c.y === y + 1)) {
                    ctx.beginPath();
                    ctx.moveTo(cell.px, cell.py + cell.h + gap / 2);
                    ctx.lineTo(cell.px + cell.w, cell.py + cell.h + gap / 2);
                    ctx.stroke();
                }
            }
        }
        ctx.setLineDash([]);
    }

    ctx.restore();
}

/* ====== 页面切换 ====== */
function startGame() {
    document.getElementById('rulesPage').style.display = 'none';
    document.getElementById('gamePage').style.display = 'flex';
    loadLevel(currentLevel);
}
function backToRules() {
    document.getElementById('gamePage').style.display = 'none';
    document.getElementById('rulesPage').style.display = 'flex';
}

/* ====== 模态框 ====== */
function showModal(text) {
    document.getElementById('modalText').textContent = text;
    document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

/* ====== Canvas 点击检测 ====== */
function getCellAt(mx, my) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (mx - rect.left) * scaleX;
    const y = (my - rect.top) * scaleY;

    for (const cell of cells) {
        if (x >= cell.px && x <= cell.px + cell.w && y >= cell.py && y <= cell.py + cell.h) {
            return cell;
        }
    }
    return null;
}

function bindClickEvents() {
    canvas.addEventListener('click', (e) => {
        const cell = getCellAt(e.clientX, e.clientY);
        if (!cell) return;
        handleCellClick(cell);
    });
    canvas.style.cursor = 'default';
    canvas.addEventListener('mousemove', (e) => {
        const cell = getCellAt(e.clientX, e.clientY);
        canvas.style.cursor = cell ? 'pointer' : 'default';
    });
}

/* ====== 点击处理 ====== */
function handleCellClick(cell) {
    const { x, y } = cell;

    // 1. 点击已填充区块 → 整组还原 + 粒子
    for (let i = 0; i < filledBlocks.length; i++) {
        const block = filledBlocks[i];
        if (block.cells.some(c => c.x === x && c.y === y)) {
            spawnParticles(cell.px + cell.w / 2, cell.py + cell.h / 2, getBlockColor(block.number).fill, 5);
            filledBlocks.splice(i, 1);
            document.getElementById('winTip').textContent = '';
            document.getElementById('nextLevelBtn').style.display = 'none';
            draw();
            return;
        }
    }

    // 2. 取消选中
    const selIdx = selectedCells.findIndex(c => c.x === x && c.y === y);
    if (selIdx !== -1) {
        selectedCells.splice(selIdx, 1);
        if (selectedCells.length === 0) currentNumber = 0;
        draw();
        return;
    }

    // 3. 未开始 → 必须点数字
    if (currentNumber === 0) {
        const val = board[y][x];
        if (val > 0) {
            currentNumber = val;
            selectedCells.push(cell);
            draw();
            if (currentNumber === 1) fillCurrentBlock();
            return;
        } else {
            showModal('请先点击带有数字的格子开始选择！');
            return;
        }
    }

    // 4. 切换数字
    const val = board[y][x];
    if (val > 0) {
        selectedCells = [];
        currentNumber = val;
        selectedCells.push(cell);
        draw();
        return;
    }

    // 5. 点已填充
    if (isCellFilled(x, y)) {
        showModal('这个格子已经被占用了！');
        return;
    }

    // 6. 超过数量
    if (selectedCells.length + 1 > currentNumber) {
        showModal(`最多只能选择 ${currentNumber} 个格子！`);
        return;
    }

    // 7. 正常添加
    selectedCells.push(cell);
    draw();

    // 8. 选满 → 校验
    if (selectedCells.length === currentNumber) {
        if (isRectangle(selectedCells)) {
            fillCurrentBlock();
        } else {
            showModal(`错误！所选的 ${currentNumber} 个格子不是正方形/长方形！`);
        }
    }
}

function fillCurrentBlock() {
    const newBlock = { number: currentNumber, cells: [...selectedCells] };
    filledBlocks.push(newBlock);
    selectedCells = [];
    currentNumber = 0;

    for (const cell of newBlock.cells) {
        spawnParticles(cell.px + cell.w / 2, cell.py + cell.h / 2, '#ffd43b', 8);
    }

    const totalFilled = filledBlocks.reduce((s, b) => s + b.cells.length, 0);
    if (totalFilled === boardSize * boardSize) { onWin(); }
    draw();
}

function onWin() {
    for (let i = 0; i < 50; i++) {
        const colors = ['#ff6b8a','#4facfe','#ffd43b','#69db7c','#9775fa','#ffa94d'];
        spawnParticles(canvas.width/2, canvas.height/2, colors[Math.floor(Math.random()*colors.length)], 3);
    }

    if (currentLevel >= TOTAL_LEVELS) {
        document.getElementById('winTip').textContent = `\ud83c\udfc6 恭喜！已通关全部 ${TOTAL_LEVELS} 关！`;
    } else {
        document.getElementById('winTip').textContent = `\ud83c\udf89 第 ${currentLevel} 关通关！`;
        document.getElementById('nextLevelBtn').style.display = 'block';
    }
}

/* ====== 按钮事件 ====== */
document.getElementById('nextLevelBtn').addEventListener('click', () => {
    if (currentLevel < TOTAL_LEVELS) initBoard(currentLevel + 1);
});

function goPrevLevel() { if (currentLevel > 1) initBoard(currentLevel - 1); }
function resetCurrent() { initBoard(currentLevel); }
function newGame() { currentLevel = 1; initBoard(1); }

/* ====== URL hash 路由 ====== */
if (window.location.hash === '#game') startGame();
</script>
