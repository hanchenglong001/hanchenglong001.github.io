<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Debug Test</title>
<style>
body { background: #1a1a2e; color: white; font-family: monospace; padding: 20px; }
canvas { border: 2px solid red; margin: 10px 0; }
.log { background: #333; padding: 10px; margin: 10px 0; max-height: 400px; overflow-y: scroll; font-size: 12px; }
</style>
</head>
<body>
<h2>Debug Test - Number Grid Game</h2>
<canvas id="testCanvas" width="300" height="300"></canvas>
<div class="log" id="log"></div>
<script>
const canvas = document.getElementById('testCanvas');
const ctx = canvas.getContext('2d');
const logEl = document.getElementById('log');

function log(msg) {
    console.log(msg);
    logEl.innerHTML += msg + '<br>';
}

// Setup board - same as generatePuzzle for level 1
let board = Array(3).fill(0).map(() => Array(3).fill(0));
let cells = [];
for (let y = 0; y < 3; y++) {
    for (let x = 0; x < 3; x++) {
        let px = 10 + x * (96 + 3);
        let py = 10 + y * (96 + 3);
        cells.push({x, y, px, py, w: 96, h: 96});
    }
}

// Level 1 puzzle from browser observation: [0,0,2], [0,4,0], [3,0,0]
board = [
    [0, 0, 2],
    [0, 4, 0],
    [3, 0, 0]
];

let selectedCells = [];
let filledBlocks = [];
let currentNumber = 0;

// Draw function - identical to render.js
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    // Step 1: Draw filled blocks (none for now)
    for (const block of filledBlocks) {
        log('DRAWING BLOCK number=' + block.number);
    }

    // Step 2: covered set
    const covered = new Set();
    for (const block of filledBlocks) {
        for (const cell of block.cells) {
            covered.add(`${cell.x},${cell.y}`);
        }
    }

    log('--- Draw called - cells=' + cells.length + ' covered=' + covered.size + ' selected=' + selectedCells.length);

    // Draw remaining cells
    let numCount = 0;
    for (const cell of cells) {
        const key = cell.x + ',' + cell.y;
        if (covered.has(key)) {
            log('  (' + cell.x + ',' + cell.y + '): COVERED');
            continue;
        }

        const isSelected = selectedCells.some(c => c.x === cell.x && c.y === cell.y);
        const isNumber = board[cell.y][cell.x] > 0;
        const numVal = board[cell.y][cell.x];

        if (isNumber) {
            log('  (' + cell.x + ',' + cell.y + '): NUMBER ' + numVal + ', selected=' + isSelected);
            numCount++;
        } else {
            log('  (' + cell.x + ',' + cell.y + '): blank, selected=' + isSelected);
        }

        // Draw cell background
        roundRect(ctx, cell.px, cell.py, cell.w, cell.h, 14);
        ctx.fillStyle = '#252545';
        ctx.fill();

        if (isNumber) {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Segoe UI';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(numVal, cell.px + cell.w / 2, cell.py + cell.h / 2);

            roundRect(ctx, cell.px + 1, cell.py + 1, cell.w - 2, cell.h - 2, 14);
            ctx.strokeStyle = '#ff6b8a';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        if (isSelected) {
            roundRect(ctx, cell.px, cell.py, cell.w, cell.h, 14);
            ctx.strokeStyle = '#4facfe';
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }
    }

    log('Total visible numbers on canvas: ' + numCount);
}

log('=== INITIAL STATE ===');
draw();

// Now simulate clicking center cell (1,1) with number 4
log('\n--- Simulating click on (1,1) ---');
selectedCells.push({x: 1, y: 1});
currentNumber = board[1][1]; // 4
log('selected=' + selectedCells.length + ' currentNumber=' + currentNumber);

// Check what cells are visible
let numCountAfter = 0;
for (const cell of cells) {
    if (board[cell.y][cell.x] > 0) {
        let sel = selectedCells.some(c => c.x === cell.x && c.y === cell.y);
        log('Cell (' + cell.x + ',' + cell.y + '): value=' + board[cell.y][cell.x] + ' selected=' + sel);
        numCountAfter++;
    }
}

log('\n=== CLICKED (2,0) WHICH HAS NUMBER 2 ===');
selectedCells = []; // reset
selectedCells.push({x: 2, y: 0});
currentNumber = 2;
log('selected=' + selectedCells.length + ' currentNumber=' + currentNumber);
draw();

log('\n=== NOW FILL (click 2 cells for number 2) ===');
// Add one more cell to complete a 1x2 rectangle at (0,0)-(1,0)... wait that's wrong
// Let's add cell (2,1) to make a 1x2 at col 2
selectedCells.push({x: 2, y: 1});
log('Added second cell');

// Check if this forms a rectangle
function isRectangle(cellList) {
    const xs = cellList.map(c => c.x);
    const ys = cellList.map(c => c.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    return (maxX - minX + 1) * (maxY - minY + 1) === cellList.length;
}
log('isRectangle: ' + isRectangle(selectedCells));

// Fill the block
filledBlocks.push({number: currentNumber, cells: [...selectedCells]});
selectedCells = [];
currentNumber = 0;

log('\n=== AFTER FILLING NUMBER 2 ===');
draw();

// Check what's visible now
for (const cell of cells) {
    let key = cell.x + ',' + cell.y;
    let covered = filledBlocks.some(b => b.cells.some(c => c.x === cell.x && c.y === cell.y));
    if (!covered && board[cell.y][cell.x] > 0) {
        log('Visible number at (' + cell.x + ',' + cell.y + '): value=' + board[cell.y][cell.x]);
    }
}

log('\n=== ALL DONE ===');
</script>
</body>
</html>
